<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OC Underwriting Engine</title>
  </head>
  <body>
    <main>
      <h1>Underwriting Activity Selector</h1>

      <form id="underwritingForm">
        <label for="activityType">Activity category</label>
        <select id="activityType" name="activityType" disabled>
          <option value="" selected disabled>Loading categories...</option>
        </select>

        <label for="activity">Activity</label>
        <select id="activity" name="activity" disabled>
          <option value="" selected disabled>Select category first</option>
        </select>

        <label for="notes">Notes</label>
        <input id="notes" name="notes" type="text" placeholder="Optional notes" />
      </form>

      <section id="activityQuestions" aria-live="polite"></section>
    </main>

    <script src="/js/activityDropdown.js"></script>
  </body>
</html>
